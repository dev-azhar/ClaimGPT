name: ClaimGPT CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # -------------------------------------------------- Lint & Type Check
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          for svc in ingress ocr parser coding predictor validator workflow submission chat search; do
            pip install -r "services/$svc/requirements.txt"
          done

      - name: Lint with ruff
        run: python -m ruff check services/ libs/

      - name: Type check with mypy
        run: python -m mypy services/ libs/ --ignore-missing-imports

  # -------------------------------------------------- Tests
  test:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claimgpt
          POSTGRES_PASSWORD: claimgpt
          POSTGRES_DB: claimgpt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claimgpt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          for svc in ingress ocr parser coding predictor validator workflow submission chat search; do
            pip install -r "services/$svc/requirements.txt"
          done

      - name: Apply schema
        run: psql "$DATABASE_URL" -f infra/db/claimgpt_schema.sql
        env:
          DATABASE_URL: postgresql://claimgpt:claimgpt@localhost:5432/claimgpt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          DATABASE_URL: postgresql://claimgpt:claimgpt@localhost:5432/claimgpt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # -------------------------------------------------- Build & Push Images
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - ingress
          - ocr
          - parser
          - coding
          - predictor
          - validator
          - workflow
          - submission
          - chat
          - search
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Set Dockerfile
        id: dockerfile
        run: |
          if [ "${{ matrix.service }}" = "ocr" ]; then
            echo "file=infra/docker/Dockerfile.ocr" >> "$GITHUB_OUTPUT"
          else
            echo "file=infra/docker/Dockerfile.service" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.file }}
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------- Deploy (ArgoCD sync)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Trigger ArgoCD sync
        run: |
          echo "🚀 Triggering ArgoCD sync for ClaimGPT..."
          # Replace with: argocd app sync claimgpt --grpc-web
          echo "Deploy step placeholder — configure ArgoCD webhook or CLI"
