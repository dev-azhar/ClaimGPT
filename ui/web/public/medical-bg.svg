<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .med-icon { fill: none; stroke: rgba(99,130,180,0.12); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .med-fill { fill: rgba(99,130,180,0.06); stroke: none; }
      .med-icon-alt { fill: none; stroke: rgba(16,185,129,0.10); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .med-fill-alt { fill: rgba(16,185,129,0.05); stroke: none; }
    </style>
  </defs>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <circle cx="30" cy="30" r="1" fill="rgba(99,130,180,0.08)"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#dots)"/>

  <!-- Stethoscope (top-left) -->
  <g transform="translate(80,60) scale(2.2)" class="med-icon">
    <path d="M12 2C8 2 6 5 6 8v6c0 3 2 5 5 5h2c3 0 5-2 5-5v-2"/>
    <circle cx="20" cy="10" r="3"/>
    <path d="M6 8c-2 0-4 1-4 3s2 3 4 3"/>
    <circle cx="13" cy="22" r="1.5" class="med-fill"/>
  </g>

  <!-- Heartbeat / ECG (top-center) -->
  <g transform="translate(500,40)" class="med-icon-alt">
    <polyline points="0,40 30,40 40,15 50,65 60,25 70,55 80,40 120,40" stroke-width="2"/>
  </g>

  <!-- Heart (top-right area) -->
  <g transform="translate(900,80) scale(2)" class="med-icon">
    <path d="M12 21C12 21 4 14 4 8.5C4 5.5 6.5 3 9.5 3c1.7 0 3.4 1 4.5 2.4C15.1 4 16.8 3 18.5 3 21.5 3 24 5.5 24 8.5 24 14 16 21 16 21z" transform="translate(-10,-2) scale(0.9)"/>
  </g>

  <!-- DNA Helix (right side) -->
  <g transform="translate(1700,100)" class="med-icon-alt">
    <path d="M0,0 C20,20 -10,40 10,60 C30,80 0,100 20,120 C40,140 10,160 30,180" stroke-width="1.8"/>
    <path d="M30,0 C10,20 40,40 20,60 C0,80 30,100 10,120 C-10,140 20,160 0,180" stroke-width="1.8"/>
    <line x1="8" y1="30" x2="22" y2="30" stroke-width="1"/>
    <line x1="12" y1="60" x2="18" y2="60" stroke-width="1"/>
    <line x1="8" y1="90" x2="22" y2="90" stroke-width="1"/>
    <line x1="12" y1="120" x2="18" y2="120" stroke-width="1"/>
    <line x1="8" y1="150" x2="22" y2="150" stroke-width="1"/>
  </g>

  <!-- Medical Cross (center-left) -->
  <g transform="translate(120,400) scale(1.8)" class="med-icon">
    <rect x="8" y="2" width="8" height="20" rx="2" class="med-fill"/>
    <rect x="2" y="8" width="20" height="8" rx="2" class="med-fill"/>
    <rect x="8" y="2" width="8" height="20" rx="2"/>
    <rect x="2" y="8" width="20" height="8" rx="2"/>
  </g>

  <!-- Pill / Capsule (upper-middle) -->
  <g transform="translate(700,180) scale(2)" class="med-icon">
    <rect x="2" y="8" width="20" height="10" rx="5" transform="rotate(-30 12 13)"/>
    <line x1="12" y1="5" x2="12" y2="21" transform="rotate(-30 12 13)"/>
  </g>

  <!-- Clipboard with checkmarks (mid-right) -->
  <g transform="translate(1500,350) scale(2.2)" class="med-icon">
    <rect x="4" y="3" width="16" height="20" rx="2"/>
    <rect x="8" y="1" width="8" height="4" rx="1"/>
    <polyline points="8,11 10,13 14,9"/>
    <polyline points="8,16 10,18 14,14"/>
  </g>

  <!-- Syringe (bottom-left area) -->
  <g transform="translate(200,750) scale(2) rotate(-30)" class="med-icon-alt">
    <rect x="6" y="2" width="6" height="16" rx="1"/>
    <line x1="9" y1="18" x2="9" y2="24"/>
    <line x1="6" y1="6" x2="12" y2="6"/>
    <line x1="6" y1="10" x2="12" y2="10"/>
    <line x1="7" y1="0" x2="11" y2="0"/>
  </g>

  <!-- Microscope (bottom-center) -->
  <g transform="translate(800,800) scale(2)" class="med-icon">
    <circle cx="12" cy="6" r="4"/>
    <line x1="12" y1="10" x2="12" y2="20"/>
    <line x1="6" y1="20" x2="18" y2="20"/>
    <line x1="8" y1="14" x2="16" y2="14"/>
  </g>

  <!-- Lungs (center area) -->
  <g transform="translate(1100,500) scale(2.5)" class="med-icon-alt">
    <path d="M12 4v8"/>
    <path d="M12 4C12 4 8 6 6 10c-1.5 3-1 6 1 7s4-0.5 5-3"/>
    <path d="M12 4C12 4 16 6 18 10c1.5 3 1 6-1 7s-4-0.5-5-3"/>
  </g>

  <!-- Tooth (lower-right) -->
  <g transform="translate(1600,700) scale(2)" class="med-icon">
    <path d="M8 3c-2 0-4 2-4 5 0 2 1 4 2 7 0.5 1.5 1 3 2 3s1.5-2 2-2 1 2 2 2 1.5-1.5 2-3c1-3 2-5 2-7 0-3-2-5-4-5-1 0-1.5 0.5-2 0.5S9 3 8 3z"/>
  </g>

  <!-- Shield with cross (health insurance icon, mid-left) -->
  <g transform="translate(60,600) scale(2.2)" class="med-icon-alt">
    <path d="M12 2L4 6v5c0 5 3.5 9.7 8 11 4.5-1.3 8-6 8-11V6L12 2z"/>
    <line x1="12" y1="8" x2="12" y2="16"/>
    <line x1="8" y1="12" x2="16" y2="12"/>
  </g>

  <!-- Thermometer (right side) -->
  <g transform="translate(1780,500) scale(2)" class="med-icon">
    <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
    <circle cx="11.5" cy="18" r="2" class="med-fill"/>
  </g>

  <!-- Bandage / Band-Aid (top area) -->
  <g transform="translate(1200,50) scale(2)" class="med-icon">
    <rect x="2" y="8" width="20" height="8" rx="4" transform="rotate(-45 12 12)"/>
    <circle cx="10.5" cy="10.5" r="0.8" class="med-fill"/>
    <circle cx="13.5" cy="13.5" r="0.8" class="med-fill"/>
    <circle cx="10.5" cy="13.5" r="0.8" class="med-fill"/>
    <circle cx="13.5" cy="10.5" r="0.8" class="med-fill"/>
  </g>

  <!-- Eye (vision, mid area) -->
  <g transform="translate(400,550) scale(2)" class="med-icon-alt">
    <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/>
    <circle cx="12" cy="12" r="3"/>
  </g>

  <!-- Ambulance cross + wheel (bottom area) -->
  <g transform="translate(600,900) scale(2)" class="med-icon">
    <rect x="1" y="6" width="18" height="10" rx="2"/>
    <line x1="10" y1="8" x2="10" y2="14"/>
    <line x1="7" y1="11" x2="13" y2="11"/>
    <circle cx="5" cy="17" r="1.5"/>
    <circle cx="15" cy="17" r="1.5"/>
  </g>

  <!-- Brain (upper area) -->
  <g transform="translate(350,200) scale(2)" class="med-icon-alt">
    <path d="M12 2C9 2 7 4 7 6c-2 0-4 2-4 4s1 3 2 4c-0.5 1-1 2-1 3 0 2 2 4 4 4h1"/>
    <path d="M12 2c3 0 5 2 5 4 2 0 4 2 4 4s-1 3-2 4c0.5 1 1 2 1 3 0 2-2 4-4 4h-1"/>
    <line x1="12" y1="2" x2="12" y2="21"/>
  </g>

  <!-- Molecule / Atom (lower-left) -->
  <g transform="translate(450,850) scale(2)" class="med-icon">
    <circle cx="12" cy="12" r="2" class="med-fill"/>
    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(0 12 12)"/>
    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/>
    <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
  </g>

  <!-- Document / Medical Record (center-right) -->
  <g transform="translate(1350,200) scale(2)" class="med-icon">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14,2 14,8 20,8"/>
    <line x1="8" y1="13" x2="16" y2="13"/>
    <line x1="8" y1="17" x2="13" y2="17"/>
  </g>

  <!-- Heartbeat line (bottom strip) -->
  <g transform="translate(0,1020)" class="med-icon-alt">
    <polyline points="0,30 100,30 120,10 140,50 160,20 180,40 200,30 400,30 420,5 440,55 460,20 480,45 500,30 700,30 720,10 740,50 760,25 780,42 800,30 1000,30 1020,8 1040,52 1060,22 1080,40 1100,30 1300,30 1320,12 1340,48 1360,20 1380,42 1400,30 1600,30 1620,8 1640,52 1660,22 1680,40 1700,30 1920,30" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Caduceus / Medical staff (far right bottom) -->
  <g transform="translate(1820,780) scale(2)" class="med-icon">
    <line x1="12" y1="2" x2="12" y2="22"/>
    <path d="M12 6C12 6 8 4 6 6s2 4 6 4"/>
    <path d="M12 6C12 6 16 4 18 6s-2 4-6 4"/>
    <path d="M12 10C12 10 8 8 6 10s2 4 6 4"/>
    <path d="M12 10C12 10 16 8 18 10s-2 4-6 4"/>
    <circle cx="12" cy="2" r="1.5"/>
  </g>

  <!-- Kidney (mid area) -->
  <g transform="translate(950,380) scale(2.2)" class="med-icon-alt">
    <path d="M16 4c-3-2-7 0-8 4-1 4 1 8-1 12"/>
    <path d="M8 4c3-2 7 0 8 4 1 4-1 8 1 12"/>
  </g>

  <!-- Wheelchair (bottom-right) -->
  <g transform="translate(1400,850) scale(2)" class="med-icon">
    <circle cx="12" cy="18" r="4"/>
    <line x1="12" y1="14" x2="12" y2="6"/>
    <line x1="12" y1="6" x2="16" y2="6"/>
    <line x1="12" y1="10" x2="18" y2="10"/>
    <line x1="18" y1="10" x2="18" y2="18"/>
  </g>

  <!-- Hospital building (upper right) -->
  <g transform="translate(1550,60) scale(2)" class="med-icon-alt">
    <rect x="4" y="4" width="16" height="18" rx="1"/>
    <line x1="12" y1="8" x2="12" y2="14"/>
    <line x1="9" y1="11" x2="15" y2="11"/>
    <rect x="9" y="18" width="6" height="4"/>
    <line x1="4" y1="22" x2="20" y2="22"/>
  </g>

  <!-- Blood drop (mid-bottom) -->
  <g transform="translate(1050,750) scale(2.5)" class="med-icon">
    <path d="M12 2C12 2 6 9 6 14a6 6 0 0 0 12 0C18 9 12 2 12 2z"/>
  </g>

</svg>