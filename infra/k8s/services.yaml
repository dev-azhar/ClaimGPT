# Template for a ClaimGPT Python microservice deployment
# Replace ${SERVICE} and ${PORT} when applying, or use Kustomize overlays.
#
# Services and their ports:
#   ingress:8001  ocr:8002  parser:8003  coding:8004  predictor:8005
#   validator:8006  workflow:8007  submission:8008  chat:8009  search:8010
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress
  namespace: claimgpt
  labels:
    app: ingress
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
        tier: api
    spec:
      containers:
        - name: ingress
          image: claimgpt/ingress:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: claimgpt-config
          env:
            - name: INGRESS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: claimgpt-db-secret
                  key: DATABASE_URL
            - name: INGRESS_STORAGE_ROOT
              value: /app/storage/raw
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingress-svc
  namespace: claimgpt
spec:
  selector:
    app: ingress
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
# OCR — CPU-pool node affinity for heavy processing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr
  namespace: claimgpt
  labels:
    app: ocr
    tier: compute
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ocr
  template:
    metadata:
      labels:
        app: ocr
        tier: compute
    spec:
      nodeSelector:
        node-pool: cpu
      containers:
        - name: ocr
          image: claimgpt/ocr:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: claimgpt-config
          env:
            - name: OCR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: claimgpt-db-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-svc
  namespace: claimgpt
spec:
  selector:
    app: ocr
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
# Parser — GPU-pool if LayoutLMv3 is in use
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parser
  namespace: claimgpt
  labels:
    app: parser
    tier: compute
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parser
  template:
    metadata:
      labels:
        app: parser
        tier: compute
    spec:
      nodeSelector:
        node-pool: gpu
      containers:
        - name: parser
          image: claimgpt/parser:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: claimgpt-config
          env:
            - name: PARSER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: claimgpt-db-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: parser-svc
  namespace: claimgpt
spec:
  selector:
    app: parser
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
