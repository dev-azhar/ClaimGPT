# =====================================================
# ClaimGPT — Local Development Docker Compose
# =====================================================
# Usage:
#   docker compose up -d                     # start all infra + services
#   docker compose up -d postgres redis minio # infra only
#   docker compose --profile gpu up -d       # include GPU services
# =====================================================

services:
  # -------------------------------------------------- Infrastructure
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: claimgpt
      POSTGRES_PASSWORD: claimgpt
      POSTGRES_DB: claimgpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../infra/db/claimgpt_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimgpt"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: claimgpt
      MINIO_ROOT_PASSWORD: claimgpt123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/claimgpt
      KC_DB_USERNAME: claimgpt
      KC_DB_PASSWORD: claimgpt
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/claimgpt-realm.json:/opt/keycloak/data/import/claimgpt-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -------------------------------------------------- Application Services
  ingress:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: ingress
    environment:
      INGRESS_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      INGRESS_STORAGE_ROOT: /app/storage/raw
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ocr:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.ocr
    environment:
      OCR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_ENABLE_PADDLE_OCR: ${OCR_ENABLE_PADDLE_OCR:-true}
      OCR_ENABLE_PADDLE_VL: ${OCR_ENABLE_PADDLE_VL:-true}
      OCR_ENABLE_SECONDARY_OCR_ON_PDF: ${OCR_ENABLE_SECONDARY_OCR_ON_PDF:-true}
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy

  parser:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: parser
    environment:
      PARSER_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PARSER_STRUCTURED_EXTRACTION_ENABLED: "true"
      PARSER_LLM_URL: http://host.docker.internal:11434/api/generate
      PARSER_LLM_MODEL: llama3.2
      PARSER_LLM_TIMEOUT_SECONDS: "180"
      PARSER_STRUCTURED_RETRY_CHARS: "8000"
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy

  coding:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: coding
    environment:
      CODING_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy

  predictor:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: predictor
    environment:
      PREDICTOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy

  validator:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: validator
    environment:
      VALIDATOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
    ports:
      - "8006:8000"
    depends_on:
      postgres:
        condition: service_healthy

  workflow:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: workflow
    environment:
      WORKFLOW_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      WORKFLOW_INGRESS_URL: http://ingress:8000
      WORKFLOW_OCR_URL: http://ocr:8000
      WORKFLOW_PARSER_URL: http://parser:8000
      WORKFLOW_CODING_URL: http://coding:8000
      WORKFLOW_PREDICTOR_URL: http://predictor:8000
      WORKFLOW_VALIDATOR_URL: http://validator:8000
    ports:
      - "8007:8000"
    depends_on:
      postgres:
        condition: service_healthy

  submission:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: submission
    environment:
      SUBMISSION_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
    ports:
      - "8008:8000"
    depends_on:
      postgres:
        condition: service_healthy

  chat:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: chat
    environment:
      CHAT_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
    ports:
      - "8009:8000"
    depends_on:
      postgres:
        condition: service_healthy

  search:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: search
    environment:
      SEARCH_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
