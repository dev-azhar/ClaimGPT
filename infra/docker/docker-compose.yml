# Docker Compose Configuration — CORRECTED VERSION
# This file fixes all networking, environment variable, and resource constraint issues
# See INFRASTRUCTURE_AUDIT_REPORT.md for detailed explanation

services:
  gateway:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.gateway
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      SUBMISSION_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      REDIS_URL: redis://redis:6379/0
      INGRESS_URL: http://ingress:8000
      OCR_URL: http://ocr:8000
      PARSER_URL: http://parser:8000
      CODING_URL: http://coding:8000
      PREDICTOR_URL: http://predictor:8000
      VALIDATOR_URL: http://validator:8000
      FRAUD_URL: http://fraud:8000
      WORKFLOW_URL: http://workflow:8000
      SUBMISSION_URL: http://submission:8000
      CHAT_URL: http://chat:8000
      SEARCH_URL: http://search:8000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      INGRESS_STORAGE_ROOT: /app/services/ingress/storage/raw
      CLAIMGPT_INLINE_PIPELINE: "false"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      PARSER_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PARSER_OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      PARSER_OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
    ports:
      - "8000:8000"
    volumes:
      - shared-storage:/app/services/ingress/storage/raw
      - ../../tmp/ocr_debug:/app/tmp/ocr_debug
      - ../../tmp/parser_debug:/app/tmp/parser_debug
      - ../../services:/app/services
      - ../../libs:/app/libs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ocr_worker:
        condition: service_started
      parsing_worker:
        condition: service_started
      other_worker:
        condition: service_started
      ingress:
        condition: service_started
      ocr:
        condition: service_started
      parser:
        condition: service_started
      coding:
        condition: service_started
      predictor:
        condition: service_started
      validator:
        condition: service_started
      fraud:
        condition: service_started
      workflow:
        condition: service_started
      submission:
        condition: service_started
      chat:
        condition: service_started
      search:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 6G

  # ================================================= Celery Workers
  ocr_worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.ocr
    command: celery -A libs.shared.celery_app worker -Q ocr_queue --pool=solo --concurrency=1 --loglevel=info --hostname=ocr_worker@%h
    environment:
      PYTHONUNBUFFERED: "1"
      OCR_ENABLE_PADDLE_OCR: ${OCR_ENABLE_PADDLE_OCR:-true}
      OCR_ENABLE_PADDLE_VL: ${OCR_ENABLE_PADDLE_VL:-false}
      OCR_ENABLE_SECONDARY_OCR_ON_PDF: ${OCR_ENABLE_SECONDARY_OCR_ON_PDF:-false}
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PARSER_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      CODING_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PREDICTOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      VALIDATOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      POSTGRES_DB: claimgpt
      POSTGRES_USER: claimgpt
      POSTGRES_PASSWORD: claimgpt
      WORKFLOW_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_REDIS_URL: redis://redis:6379/0
      PARSER_REDIS_URL: redis://redis:6379/0
      PREDICTOR_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      CELERY_WORKER: "true"
      # Quality gate thresholds — must match the OCR service
      OCR_BLUR_BLURRY: "40"
      OCR_BLUR_SOFT: "100"
      OCR_ACCEPTANCE_SCORE: "0.50"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - shared-storage:/app/services/ingress/storage/raw
      - ../../tmp/ocr_debug:/app/tmp/ocr_debug
      - ../../services:/app/services
      - ../../libs:/app/libs
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  parsing_worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: workflow
    command: celery -A libs.shared.celery_app worker -Q parser_queue --pool=threads --concurrency=2 --loglevel=info --hostname=parsing_worker@%h
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PARSER_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      CODING_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PREDICTOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      VALIDATOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      POSTGRES_DB: claimgpt
      POSTGRES_USER: claimgpt
      POSTGRES_PASSWORD: claimgpt
      WORKFLOW_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_REDIS_URL: redis://redis:6379/0
      PARSER_REDIS_URL: redis://redis:6379/0
      PREDICTOR_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      CELERY_WORKER: "true"
      # OpenRouter LLM backend — required for expense table extraction
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      PARSER_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PARSER_OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      PARSER_OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      # Use OpenRouter as primary semantic backend (no Ollama)
      PARSER_SEMANTIC_BACKEND_ORDER: "openrouter,qwen2-vl,layoutlmv3,florence-2,donut"
      PARSER_STRUCTURED_EXTRACTION_ENABLED: "false"
      DISABLE_OCR_PREWARM: "1"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - shared-storage:/app/services/ingress/storage/raw
      - ../../tmp/parser_debug:/app/tmp/parser_debug
      - paddlex-models:/root/.paddlex
      - ../../services:/app/services
      - ../../libs:/app/libs
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G

  other_worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: workflow
    command: celery -A libs.shared.celery_app worker -Q default --pool=threads --concurrency=4 --loglevel=info --hostname=other_worker@%h
    environment:
      PYTHONUNBUFFERED: "1"
      INGRESS_STORAGE_ROOT: /app/services/ingress/storage/raw
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PARSER_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      CODING_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PREDICTOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      VALIDATOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      POSTGRES_DB: claimgpt
      POSTGRES_USER: claimgpt
      POSTGRES_PASSWORD: claimgpt
      WORKFLOW_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_REDIS_URL: redis://redis:6379/0
      PARSER_REDIS_URL: redis://redis:6379/0
      PREDICTOR_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      CELERY_WORKER: "true"
      # OpenRouter LLM backend — needed for coding/finalize tasks
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      PARSER_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PARSER_OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      PARSER_OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      CODING_DISABLE_SCISPACY: "true"
      DISABLE_OCR_PREWARM: "1"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - shared-storage:/app/services/ingress/storage/raw
      - ../../tmp/ocr_debug:/app/tmp/ocr_debug
      - ../../services:/app/services
      - ../../libs:/app/libs
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G


  flower:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: workflow
    command: celery -A libs.shared.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # ================================================= Infrastructure
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: claimgpt
      POSTGRES_PASSWORD: claimgpt
      POSTGRES_DB: claimgpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../infra/db/claimgpt_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimgpt"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: claimgpt
      MINIO_ROOT_PASSWORD: claimgpt123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/claimgpt
      KC_DB_USERNAME: claimgpt
      KC_DB_PASSWORD: claimgpt
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak/claimgpt-realm.json:/opt/keycloak/data/import/claimgpt-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ================================================= Application Services

  ingress:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: ingress
    environment:
      INGRESS_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      INGRESS_STORAGE_ROOT: /app/services/ingress/storage/raw
      INGRESS_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      # Celery broker — required so _enqueue_pipeline() routes tasks to workers
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Force Celery mode — never fall back to inline thread execution
      CLAIMGPT_INLINE_PIPELINE: "false"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - shared-storage:/app/services/ingress/storage/raw
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/ingress/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  ocr:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.ocr
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      OCR_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OCR_ENABLE_PADDLE_OCR: ${OCR_ENABLE_PADDLE_OCR:-true}
      OCR_ENABLE_PADDLE_VL: ${OCR_ENABLE_PADDLE_VL:-false}
      OCR_ENABLE_SECONDARY_OCR_ON_PDF: ${OCR_ENABLE_SECONDARY_OCR_ON_PDF:-false}
      # Quality gate thresholds — lowered so real scanned hospital bills pass through.
      # Set OCR_BLUR_BLURRY=0 to disable blur rejection entirely.
      OCR_BLUR_BLURRY: "40"
      OCR_BLUR_SOFT: "100"
      OCR_ACCEPTANCE_SCORE: "0.50"
      PYTHONPATH: /app
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - shared-storage:/app/services/ingress/storage/raw
      - ../../services:/app/services
      - ../../libs:/app/libs
    entrypoint: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  parser:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: parser
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PARSER_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      PARSER_REDIS_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      PARSER_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PARSER_OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      PARSER_OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../tmp/parser_debug:/app/tmp/parser_debug
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/parser/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  coding:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: coding
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      PARSER_OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      PARSER_OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      PARSER_OPENROUTER_URL: ${OPENROUTER_URL:-https://openrouter.ai/api/v1/chat/completions}
      CODING_DISABLE_SCISPACY: "true"
    ports:
      - "8004:8000"
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  predictor:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: predictor
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/predictor/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  validator:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: validator
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      VALIDATOR_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8006:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/validator/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  fraud:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: fraud
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      FRAUD_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      FRAUD_RULES_ENABLED: "true"
      FRAUD_ML_ENABLED: "true"
      FRAUD_LLM_ENABLED: "false"
    ports:
      - "8011:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/fraud/app:/app/app

  workflow:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: workflow
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      WORKFLOW_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      WORKFLOW_INGRESS_URL: http://ingress:8000
      WORKFLOW_OCR_URL: http://ocr:8000
      WORKFLOW_PARSER_URL: http://parser:8000
      WORKFLOW_CODING_URL: http://coding:8000
      WORKFLOW_PREDICTOR_URL: http://predictor:8000
      WORKFLOW_VALIDATOR_URL: http://validator:8000
      WORKFLOW_FRAUD_URL: http://fraud:8000
      WORKFLOW_SUBMISSION_URL: http://submission:8000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8007:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/workflow/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  submission:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: submission
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      SUBMISSION_DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8008:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/submission/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  chat:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: chat
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8009:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/chat/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  search:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: search
    environment:
      DATABASE_URL: postgresql://claimgpt:claimgpt@postgres:5432/claimgpt
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8010:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services:/app/services
      - ../../libs:/app/libs
      - ../../services/search/app:/app/app
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  pgdata:
  miniodata:
  shared-storage:
  paddlex-models:
